input {
  beats {
    port => 5044
  }
}

filter {
  # Extract the message part from the standard log format
  grok {
    match => { "message" => "%{TIMESTAMP_ISO8601:timestamp} - %{DATA:logger} - %{LOGLEVEL:level} - %{GREEDYDATA:log_message}" }
  }
  
  # If the message contains JSON, parse it
  if [log_message] =~ /\{.*\}/ {
    json {
      source => "log_message"
      target => "parsed_data"
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "honeymanager-logs-%{+YYYY.MM.dd}"
  }
}
